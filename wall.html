<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Photo Wall · Wedding</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- QR Code library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:     #f5f0e8;
      --warm-gold: #c9a96e;
      --deep-gold: #a07840;
      --dark:      #100e0c;
      --dark-2:    #1a1612;
      --dark-3:    #231f1a;
      --muted:     #7a6e60;
      --border:    rgba(201,169,110,0.2);
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans:  'DM Sans', sans-serif;
      --sidebar-w: 260px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--cream);
      font-family: var(--font-sans);
    }

    /* ─── Ambient gradient ─── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 10% 10%, rgba(201,169,110,0.06) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 90% 90%, rgba(201,169,110,0.04) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    /* ─── Layout ─── */
    .layout {
      display: flex;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 20px;
      border-right: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
      backdrop-filter: blur(8px);
      gap: 24px;
    }

    .sidebar-brand {
      text-align: center;
    }

    .brand-ornament {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      color: var(--warm-gold);
      margin-bottom: 6px;
    }

    .brand-title {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--cream);
      line-height: 1.3;
    }
    .brand-title em { font-style: italic; color: var(--warm-gold); }

    .brand-date {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ─── QR Section ─── */
    .qr-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
    }

    .qr-label-top {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    .qr-box {
      background: var(--cream);
      padding: 12px;
      border-radius: 10px;
      box-shadow:
        0 0 0 1px var(--border),
        0 12px 40px rgba(0,0,0,0.5),
        0 0 60px rgba(201,169,110,0.12);
    }

    .qr-cta {
      font-family: var(--font-serif);
      font-size: 1rem;
      font-style: italic;
      color: var(--cream);
      text-align: center;
      line-height: 1.4;
    }

    .qr-arrow {
      font-size: 0.75rem;
      color: var(--warm-gold);
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ─── Divider ─── */
    .sidebar-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* ─── Live indicator ─── */
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #5ec97e;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(94,201,126,0.5); }
      50%       { opacity: 0.8; box-shadow: 0 0 0 5px rgba(94,201,126,0); }
    }

    .photo-counter {
      text-align: center;
    }
    .counter-num {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--warm-gold);
      line-height: 1;
    }
    .counter-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ─── Main wall ─── */
    .wall {
      flex: 1;
      overflow: hidden;
      position: relative;
      padding: 16px;
    }

    /* Masonry using CSS columns */
    .masonry-wall {
      columns: 4;
      column-gap: 12px;
      height: 100%;
      overflow: hidden;
    }
    @media (min-width: 1600px) { .masonry-wall { columns: 5; } }
    @media (max-width: 1100px) { .masonry-wall { columns: 3; } }

    .wall-item {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    /* New items animate in */
    .wall-item.new {
      animation: photoReveal 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes photoReveal {
      from {
        opacity: 0;
        transform: scale(0.88) translateY(16px);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    /* Golden shimmer for newest photo */
    .wall-item.newest::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      box-shadow: 0 0 0 2.5px var(--warm-gold), 0 0 30px rgba(201,169,110,0.4);
      animation: shimmerBorder 3s ease forwards;
    }
    @keyframes shimmerBorder {
      0%   { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .wall-item img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    /* ─── Empty / loading state ─── */
    .wall-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      text-align: center;
    }
    .wall-empty-icon {
      font-size: 3rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    .wall-empty h2 {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 300;
      font-style: italic;
      color: var(--cream);
    }
    .wall-empty p { font-size: 0.85rem; color: var(--muted); }

    /* ─── Ticker ─── */
    .ticker {
      position: fixed;
      bottom: 0; left: var(--sidebar-w); right: 0;
      height: 34px;
      background: rgba(201,169,110,0.08);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      overflow: hidden;
      z-index: 10;
    }
    .ticker-inner {
      display: flex;
      align-items: center;
      gap: 48px;
      animation: tickerScroll 30s linear infinite;
      white-space: nowrap;
      padding-left: 100%;
    }
    @keyframes tickerScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .ticker-item {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .ticker-item span { color: var(--warm-gold); }
  </style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <div class="brand-ornament">✦</div>
      <div class="brand-title">Live<br/><em>Photo Wall</em></div>
      <div class="brand-date" id="event-date">Your Wedding Day</div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="qr-section">
      <p class="qr-label-top">Scan to share</p>
      <div class="qr-box" id="qr-code"></div>
      <p class="qr-cta">Add your moment<br/>to the wall</p>
      <div class="qr-arrow">
        <span style="color:var(--warm-gold)">✦</span>
        <span>Upload a photo</span>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="photo-counter">
      <div class="counter-num" id="counter">0</div>
      <div class="counter-label">moments shared</div>
    </div>

    <div class="live-indicator">
      <div class="live-dot"></div>
      <span>Live</span>
    </div>

  </aside>

  <!-- Main Wall -->
  <main class="wall">
    <div class="masonry-wall" id="wall-grid"></div>
    <div class="wall-empty" id="wall-empty">
      <div class="wall-empty-icon">✨</div>
      <h2>Waiting for memories…</h2>
      <p>Guests can scan the QR code to upload their photos</p>
    </div>
  </main>

</div>

<!-- Ticker -->
<div class="ticker">
  <div class="ticker-inner" id="ticker-inner">
    <!-- Populated by JS -->
  </div>
</div>

<!-- Firebase -->
<script src="firebase-config.js"></script>
<script type="module">
  import { initializeApp }                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, query, orderByChild, onChildAdded, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── Init ──────────────────────────────────────────────────
  const app      = initializeApp(FIREBASE_CONFIG);
  const database = getDatabase(app);
  const photosRef = ref(database, 'photos');

  // ── DOM refs ──────────────────────────────────────────────
  const wallGrid    = document.getElementById('wall-grid');
  const wallEmpty   = document.getElementById('wall-empty');
  const counter     = document.getElementById('counter');
  const qrContainer = document.getElementById('qr-code');
  const tickerInner = document.getElementById('ticker-inner');
  const eventDate   = document.getElementById('event-date');

  // ── Date ──────────────────────────────────────────────────
  eventDate.textContent = new Date().toLocaleDateString('en-US', {
    day: 'numeric', month: 'long', year: 'numeric'
  });

  // ── QR Code ───────────────────────────────────────────────
  new QRCode(qrContainer, {
    text: GUEST_URL,
    width:  160,
    height: 160,
    colorDark:  '#1a1612',
    colorLight: '#f5f0e8',
    correctLevel: QRCode.CorrectLevel.M
  });

  // ── State ─────────────────────────────────────────────────
  const rendered = new Set();
  let photoCount = 0;

  // Ticker messages
  const tickerMessages = [
    '✦ Scan the QR code to add your photo',
    '✦ Every moment matters',
    '✦ Share your favourite captures',
    '✦ Thank you for being part of this day',
    '✦ Scan the QR code to add your photo',
    '✦ Every moment matters',
    '✦ Share your favourite captures',
    '✦ Thank you for being part of this day',
  ];
  tickerInner.innerHTML = tickerMessages
    .map(m => `<span class="ticker-item">${m}</span>`).join('');

  // ── Add photo to wall ─────────────────────────────────────
  let newestKey = null;

  function addPhotoToWall(key, data, isNew = false) {
    if (rendered.has(key)) return;
    rendered.add(key);

    // Remove empty state
    wallEmpty.style.display = 'none';

    const item = document.createElement('div');
    item.className = 'wall-item' + (isNew ? ' new' : '');
    item.dataset.key = key;

    const img = document.createElement('img');
    img.src = data.url;
    img.alt = 'Wedding photo';
    img.loading = 'lazy';

    item.appendChild(img);

    if (isNew) {
      // Remove newest class from old newest
      const prevNewest = wallGrid.querySelector('.newest');
      if (prevNewest) prevNewest.classList.remove('newest');
      // Insert newest at top
      if (wallGrid.firstChild) wallGrid.insertBefore(item, wallGrid.firstChild);
      else wallGrid.appendChild(item);

      // Briefly mark as newest for shimmer
      requestAnimationFrame(() => item.classList.add('newest'));
    } else {
      wallGrid.appendChild(item);
    }

    // Update counter
    photoCount++;
    counter.textContent = photoCount;

    // Overflow: remove oldest if too many (keeps TV wall tidy)
    const items = wallGrid.querySelectorAll('.wall-item');
    if (items.length > 40) {
      const oldest = items[items.length - 1];
      rendered.delete(oldest.dataset.key);
      oldest.remove();
    }
  }

  // ── Initial load + real-time ──────────────────────────────
  const photosQuery = query(photosRef, orderByChild('timestamp'));

  let initialLoadDone = false;
  const initialBatch  = [];

  // Load existing photos in one batch, then switch to live additions
  onValue(photosQuery, snap => {
    if (initialLoadDone) return; // handled by onChildAdded
    initialLoadDone = true;

    if (!snap.exists()) return;

    const allPhotos = [];
    snap.forEach(child => allPhotos.push({ key: child.key, ...child.val() }));

    // Show most recent 30 on load
    allPhotos.slice(-30).reverse().forEach(p => addPhotoToWall(p.key, p, false));
  }, { onlyOnce: true });

  // Listen for new photos
  const liveQuery = query(photosRef, orderByChild('timestamp'));
  onChildAdded(liveQuery, snap => {
    const data = snap.val();
    if (!rendered.has(snap.key)) {
      // Delay slightly so initial batch fires first
      setTimeout(() => addPhotoToWall(snap.key, data, initialLoadDone), initialLoadDone ? 0 : 500);
    }
  });
</script>

</body>
</html>
