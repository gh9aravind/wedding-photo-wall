<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Memories · Wedding Photo Wall</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #f5f0e8;
      --warm-gold:  #c9a96e;
      --deep-gold:  #a07840;
      --dark:       #1a1612;
      --dark-2:     #231f1a;
      --dark-3:     #2e2822;
      --muted:      #8a7d6e;
      --border:     rgba(201,169,110,0.25);
      --radius:     12px;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans:  'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100dvh;
      background: var(--dark);
      color: var(--cream);
      font-family: var(--font-sans);
      font-weight: 300;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%,  rgba(201,169,110,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(201,169,110,0.05) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Hero ── */
    .hero {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: 56px 24px 40px;
    }

    .hero-ornament {
      width: 140px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--warm-gold), transparent);
      margin-bottom: 28px; position: relative;
    }
    .hero-ornament::before {
      content: '✦';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: var(--warm-gold); font-size: 10px;
      background: var(--dark); padding: 0 8px;
    }

    .hero-eyebrow {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--warm-gold); margin-bottom: 16px;
    }

    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 300; line-height: 1.1;
      color: var(--cream); margin-bottom: 10px;
    }
    .hero-title em { font-style: italic; color: var(--warm-gold); }

    .hero-subtitle {
      font-family: var(--font-serif);
      font-size: clamp(1rem, 3vw, 1.15rem);
      color: var(--muted); font-style: italic;
    }

    /* ── Gallery header ── */
    .gallery-header {
      position: relative; z-index: 1;
      padding: 36px 20px 22px; text-align: center;
    }
    .gallery-header-line {
      display: flex; align-items: center; gap: 16px;
      max-width: 480px; margin: 0 auto 14px;
    }
    .gallery-header-line::before,
    .gallery-header-line::after {
      content: ''; flex: 1; height: 1px;
    }
    .gallery-header-line::before { background: linear-gradient(90deg, transparent, var(--border)); }
    .gallery-header-line::after  { background: linear-gradient(90deg, var(--border), transparent); }
    .gallery-header-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted); white-space: nowrap;
    }
    .gallery-count {
      font-family: var(--font-serif);
      font-size: 1.4rem; font-weight: 300; color: var(--cream);
    }
    .gallery-count span { color: var(--warm-gold); font-style: italic; }

    .gallery-hint {
      font-size: 0.78rem; color: var(--muted);
      letter-spacing: 0.06em; margin-top: 7px;
      display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
    .gallery-hint svg { width: 13px; height: 13px; opacity: 0.6; flex-shrink: 0; }

    /* ── Masonry ── */
    .gallery-section {
      position: relative; z-index: 1;
      padding: 0 12px 80px;
    }
    .masonry { columns: 2; column-gap: 10px; }
    @media (min-width: 600px)  { .masonry { columns: 3; } }
    @media (min-width: 900px)  { .masonry { columns: 4; } }
    @media (min-width: 1200px) { .masonry { columns: 5; } }

    .masonry-item {
      break-inside: avoid; margin-bottom: 10px;
      border-radius: var(--radius); overflow: hidden;
      position: relative; cursor: pointer;
      animation: fadeSlideUp 0.5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .masonry-item img {
      width: 100%; display: block;
      transition: transform 0.4s cubic-bezier(.22,1,.36,1);
    }
    .masonry-item:hover img { transform: scale(1.04); }

    .masonry-item .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,22,18,0.75) 0%, transparent 55%);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: flex-end; padding: 12px;
    }
    .masonry-item:hover .overlay { opacity: 1; }

    .overlay-hint {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72rem; color: rgba(245,240,232,0.9);
      letter-spacing: 0.06em;
    }
    .overlay-hint svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(10,8,6,0.97);
      z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lightbox-image-wrap {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      width: 100%; overflow: hidden;
      max-height: calc(100vh - 110px);
    }

    .lightbox img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 32px 80px rgba(0,0,0,0.8);
      transform: scale(0.94);
      transition: transform 0.35s cubic-bezier(.22,1,.36,1);
      display: block;
    }
    .lightbox.open img { transform: scale(1); }

    /* ── Lightbox bottom bar ── */
    .lightbox-bar {
      width: 100%; max-width: 600px;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 16px 0 0; gap: 12px; flex-shrink: 0;
    }

    .lb-close {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--cream); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; flex-shrink: 0;
    }
    .lb-close:hover { background: rgba(255,255,255,0.16); }

    .lb-label {
      font-family: var(--font-serif);
      font-style: italic; font-size: 0.95rem;
      color: var(--muted); flex: 1; text-align: center;
    }

    /* ── Download button ── */
    .lb-download {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px;
      background: linear-gradient(135deg, var(--warm-gold), var(--deep-gold));
      color: var(--dark);
      font-family: var(--font-sans);
      font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      border: none; border-radius: 50px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(201,169,110,0.35);
      flex-shrink: 0; position: relative; overflow: hidden;
    }
    .lb-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 26px rgba(201,169,110,0.5);
    }
    .lb-download:active { transform: translateY(0); }
    .lb-download.loading { opacity: 0.65; pointer-events: none; }
    .lb-download.loading .dl-label { opacity: 0; }
    .lb-download.loading .dl-spinner { display: block; }
    .lb-download svg { width: 14px; height: 14px; flex-shrink: 0; }

    .dl-spinner {
      display: none; position: absolute;
      width: 14px; height: 14px;
      border: 2px solid rgba(26,22,18,0.3);
      border-top-color: var(--dark);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--dark-2); border: 1px solid var(--border);
      color: var(--cream); font-size: 0.85rem;
      padding: 12px 22px; border-radius: 50px;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      z-index: 300; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(100,200,120,0.4); color: #a0e8b0; }
    .toast.error   { border-color: rgba(220,80,80,0.4);   color: #f0a0a0; }

    /* ── Empty / Spinner ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .es-icon { font-size: 2.5rem; margin-bottom: 14px; }
    .empty-state p { font-family: var(--font-serif); font-size: 1.1rem; font-style: italic; }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--dark-3);
      border-top-color: var(--warm-gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 40px auto;
    }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      text-align: center; padding: 20px;
      font-size: 0.75rem; color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-ornament"></div>
    <p class="hero-eyebrow">Wedding Photo Wall</p>
    <h1 class="hero-title">Our<br/><em>Shared Memories</em></h1>
    <p class="hero-subtitle">Browse and save your favourite moments from the day</p>
  </section>

  <!-- Gallery header -->
  <div class="gallery-header">
    <div class="gallery-header-line">
      <span class="gallery-header-label">Memories captured</span>
    </div>
    <p class="gallery-count"><span id="photo-count">0</span> photos</p>
    <p class="gallery-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Tap any photo to view &amp; download
    </p>
  </div>

  <!-- Masonry gallery -->
  <section class="gallery-section">
    <div class="masonry" id="gallery"></div>
    <div class="spinner" id="loader"></div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <div class="lightbox-image-wrap">
      <img id="lb-img" src="" alt="Wedding photo" />
    </div>

    <div class="lightbox-bar">
      <!-- Close -->
      <button class="lb-close" id="lb-close" aria-label="Close photo viewer">✕</button>

      <!-- Label -->
      <span class="lb-label">Wedding Memory</span>

      <!-- Download -->
      <button class="lb-download" id="lb-download" aria-label="Download photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="dl-label">Save Photo</span>
        <span class="dl-spinner"></span>
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Firebase (read-only — no Storage import needed) -->
  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref as dbRef, query, orderByChild, onValue }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ── Init ──────────────────────────────────────────────────
    const app       = initializeApp(FIREBASE_CONFIG);
    const database  = getDatabase(app);
    const photosRef = dbRef(database, 'photos');

    // ── DOM ───────────────────────────────────────────────────
    const gallery    = document.getElementById('gallery');
    const loader     = document.getElementById('loader');
    const photoCount = document.getElementById('photo-count');
    const lightbox   = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lb-img');
    const lbClose    = document.getElementById('lb-close');
    const lbDownload = document.getElementById('lb-download');
    const toast      = document.getElementById('toast');

    let rendered   = new Set();
    let currentUrl = '';
    let toastTimer = null;

    // ── Toast ─────────────────────────────────────────────────
    function showToast(msg, type = '') {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      toastTimer = setTimeout(() => { toast.className = 'toast'; }, 3200);
    }

    // ── Lightbox ──────────────────────────────────────────────
    function openLightbox(url) {
      currentUrl = url;
      lbImg.src  = url;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { lbImg.src = ''; currentUrl = ''; }, 300);
    }

    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
    });

    // ── Download ──────────────────────────────────────────────
    lbDownload.addEventListener('click', async () => {
      if (!currentUrl) return;
      lbDownload.classList.add('loading');

      try {
        // Fetch blob → create object URL → programmatic click = real Save dialog
        const res = await fetch(currentUrl);
        if (!res.ok) throw new Error('fetch failed');
        const blob = await res.blob();
        const ext  = (blob.type.split('/')[1] || 'jpg').replace('jpeg', 'jpg');
        const name = `wedding-memory-${Date.now()}.${ext}`;

        const objectUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = objectUrl; a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(objectUrl), 10000);

        showToast('✦ Photo saved to your device!', 'success');
      } catch {
        // CORS fallback: open in new tab — user can long-press (mobile) or right-click to save
        window.open(currentUrl, '_blank');
        showToast('Long-press the photo in the new tab to save it', '');
      } finally {
        lbDownload.classList.remove('loading');
      }
    });

    // ── Gallery ───────────────────────────────────────────────
    function addPhoto(key, data) {
      if (rendered.has(key)) return;
      rendered.add(key);

      const item = document.createElement('div');
      item.className = 'masonry-item';
      item.setAttribute('role', 'button');
      item.setAttribute('tabindex', '0');
      item.setAttribute('aria-label', 'View and download photo');

      item.innerHTML = `
        <img src="${data.url}" alt="Wedding photo" loading="lazy" />
        <div class="overlay">
          <span class="overlay-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Save photo
          </span>
        </div>`;

      const open = () => openLightbox(data.url);
      item.addEventListener('click', open);
      item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });

      // Newest at top
      if (gallery.firstChild) gallery.insertBefore(item, gallery.firstChild);
      else gallery.appendChild(item);
    }

    // ── Real-time listener ────────────────────────────────────
    const photosQuery = query(photosRef, orderByChild('timestamp'));

    onValue(photosQuery, snap => {
      loader.style.display = 'none';

      if (!snap.exists()) {
        if (!gallery.querySelector('.empty-state')) {
          gallery.innerHTML = `
            <div class="empty-state">
              <div class="es-icon">📷</div>
              <p>No photos yet — check back soon!</p>
            </div>`;
        }
        return;
      }

      const es = gallery.querySelector('.empty-state');
      if (es) es.remove();

      const allPhotos = [];
      snap.forEach(child => allPhotos.push({ key: child.key, ...child.val() }));
      photoCount.textContent = allPhotos.length;

      // Render newest-first; addPhoto skips already-rendered keys
      allPhotos.slice().reverse().forEach(p => addPhoto(p.key, p));
    });
  </script>

  <footer>Made with love for your special day ✦</footer>
</body>
</html>
