<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Wedding Photo Wall</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #f5f0e8;
      --warm-gold:  #c9a96e;
      --deep-gold:  #a07840;
      --dark:       #1a1612;
      --dark-2:     #231f1a;
      --dark-3:     #2e2822;
      --muted:      #8a7d6e;
      --border:     rgba(201,169,110,0.25);
      --danger:     #e05555;
      --radius:     12px;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans:  'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100dvh;
      background: var(--dark);
      color: var(--cream);
      font-family: var(--font-sans);
      font-weight: 300;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(201,169,110,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(201,169,110,0.05) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Password Gate ── */
    .gate {
      position: fixed; inset: 0;
      background: var(--dark);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .gate.hidden { display: none; }

    .gate-card {
      width: 100%; max-width: 360px;
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .gate-icon { font-size: 2.2rem; margin-bottom: 16px; }

    .gate-title {
      font-family: var(--font-serif);
      font-size: 1.8rem; font-weight: 300;
      color: var(--cream); margin-bottom: 6px;
    }
    .gate-title em { font-style: italic; color: var(--warm-gold); }

    .gate-sub {
      font-size: 0.8rem; color: var(--muted);
      letter-spacing: 0.06em; margin-bottom: 28px;
    }

    .gate-input {
      width: 100%; padding: 13px 18px;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--cream);
      font-family: var(--font-sans);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 0.15em;
    }
    .gate-input:focus { border-color: var(--warm-gold); }
    .gate-input.error { border-color: var(--danger); animation: shake 0.35s; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }

    .gate-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--warm-gold), var(--deep-gold));
      color: var(--dark);
      font-family: var(--font-sans); font-size: 0.85rem;
      font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      border: none; border-radius: 50px; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 18px rgba(201,169,110,0.35);
    }
    .gate-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .gate-error {
      font-size: 0.78rem; color: #e09090;
      margin-top: 10px; min-height: 18px;
    }

    /* ── Main App ── */
    .app { position: relative; z-index: 1; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 24px 0;
      flex-wrap: wrap; gap: 12px;
    }

    .header-brand {
      display: flex; align-items: center; gap: 12px;
    }
    .brand-badge {
      background: linear-gradient(135deg, var(--warm-gold), var(--deep-gold));
      color: var(--dark); font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 20px;
    }
    .brand-name {
      font-family: var(--font-serif); font-size: 1.2rem;
      font-weight: 300; color: var(--cream);
    }
    .brand-name em { font-style: italic; color: var(--warm-gold); }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted); font-size: 0.75rem;
      letter-spacing: 0.08em; padding: 7px 16px;
      border-radius: 20px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .logout-btn:hover { border-color: var(--danger); color: #e09090; }

    /* ── Upload Section ── */
    .upload-section {
      padding: 32px 24px 20px;
      max-width: 680px;
    }

    .section-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }

    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: 16px; padding: 32px 24px;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      cursor: pointer; text-align: center;
      transition: border-color 0.3s, background 0.3s, transform 0.2s;
      background: rgba(255,255,255,0.015);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--warm-gold);
      background: rgba(201,169,110,0.06);
      transform: translateY(-2px);
    }

    .upload-zone-icon { font-size: 2rem; }
    .upload-zone-text {
      font-family: var(--font-serif);
      font-size: 1.1rem; color: var(--cream);
    }
    .upload-zone-sub { font-size: 0.78rem; color: var(--muted); }

    #file-input { display: none; }

    .upload-actions {
      display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--warm-gold), var(--deep-gold));
      color: var(--dark); font-family: var(--font-sans);
      font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      border: none; border-radius: 50px; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(201,169,110,0.3);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,169,110,0.45); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.45; pointer-events: none; }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 20px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-sans); font-size: 0.82rem;
      letter-spacing: 0.08em; border-radius: 50px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--warm-gold); color: var(--cream); }

    /* ── Queue ── */
    .queue {
      margin-top: 20px;
      display: flex; flex-direction: column; gap: 10px;
      max-width: 680px; padding: 0 24px;
    }

    .queue-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
    }

    .queue-thumb {
      width: 44px; height: 44px;
      border-radius: 6px; object-fit: cover; flex-shrink: 0;
    }

    .queue-info { flex: 1; min-width: 0; }
    .queue-name {
      font-size: 0.82rem; color: var(--cream);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .queue-status {
      font-size: 0.72rem; color: var(--muted);
      margin-top: 3px; letter-spacing: 0.05em;
    }

    .queue-bar-bg {
      height: 3px; background: var(--dark-3);
      border-radius: 2px; overflow: hidden; margin-top: 6px;
    }
    .queue-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--warm-gold), var(--deep-gold));
      border-radius: 2px; width: 0%;
      transition: width 0.15s;
    }

    .queue-check {
      font-size: 1.1rem; flex-shrink: 0;
    }

    /* ── Divider ── */
    .divider {
      margin: 28px 24px 0;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
      max-width: 680px;
    }

    /* ── Gallery manage ── */
    .gallery-section {
      padding: 24px 24px 80px;
    }

    .gallery-header-row {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 16px; max-width: 100%;
    }

    .gallery-count-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted);
    }
    .gallery-count-num {
      font-family: var(--font-serif);
      font-size: 1.1rem; color: var(--warm-gold);
    }

    /* Masonry */
    .masonry { columns: 2; column-gap: 10px; }
    @media (min-width: 500px)  { .masonry { columns: 3; } }
    @media (min-width: 800px)  { .masonry { columns: 4; } }
    @media (min-width: 1100px) { .masonry { columns: 5; } }

    .m-item {
      break-inside: avoid; margin-bottom: 10px;
      border-radius: var(--radius); overflow: hidden;
      position: relative;
      animation: fadeUp 0.4s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .m-item img { width: 100%; display: block; }

    .m-item .del-overlay {
      position: absolute; inset: 0;
      background: rgba(10,8,6,0);
      display: flex; align-items: flex-end;
      padding: 10px;
      transition: background 0.25s;
    }
    .m-item:hover .del-overlay { background: rgba(10,8,6,0.55); }

    .del-btn {
      opacity: 0;
      display: flex; align-items: center; gap: 5px;
      padding: 7px 14px;
      background: rgba(220,60,60,0.85);
      color: #fff; font-size: 0.72rem;
      letter-spacing: 0.06em;
      border: none; border-radius: 20px; cursor: pointer;
      transition: opacity 0.25s, transform 0.2s;
      transform: translateY(4px);
    }
    .m-item:hover .del-btn {
      opacity: 1; transform: translateY(0);
    }
    .del-btn:hover { background: rgb(220,60,60); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 50px 20px; color: var(--muted);
    }
    .empty-state .es-icon { font-size: 2.2rem; margin-bottom: 12px; }
    .empty-state p { font-family: var(--font-serif); font-style: italic; font-size: 1rem; }

    /* ── Spinner ── */
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--dark-3);
      border-top-color: var(--warm-gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 32px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--dark-2); border: 1px solid var(--border);
      color: var(--cream); font-size: 0.84rem;
      padding: 11px 22px; border-radius: 50px; opacity: 0;
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      z-index: 400; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(100,200,120,0.4); color: #a0e8b0; }
    .toast.error   { border-color: rgba(220,80,80,0.4);   color: #f0a0a0; }

    /* ── Confirm dialog ── */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(10,8,6,0.85);
      z-index: 450;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }
    .confirm-card {
      background: var(--dark-2); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px 28px; text-align: center;
      max-width: 320px; width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .confirm-icon { font-size: 2rem; margin-bottom: 12px; }
    .confirm-title {
      font-family: var(--font-serif); font-size: 1.3rem;
      color: var(--cream); margin-bottom: 8px;
    }
    .confirm-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 24px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }
    .confirm-cancel {
      padding: 10px 22px; background: transparent;
      border: 1px solid var(--border); color: var(--muted);
      border-radius: 50px; cursor: pointer; font-size: 0.82rem;
      transition: border-color 0.2s;
    }
    .confirm-cancel:hover { border-color: var(--warm-gold); color: var(--cream); }
    .confirm-delete {
      padding: 10px 22px;
      background: var(--danger); color: #fff;
      border: none; border-radius: 50px; cursor: pointer;
      font-size: 0.82rem; transition: opacity 0.2s;
    }
    .confirm-delete:hover { opacity: 0.85; }
  </style>
</head>
<body>

<!-- ── Password Gate ── -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-icon">🔐</div>
    <h1 class="gate-title">Admin<br/><em>Access</em></h1>
    <p class="gate-sub">Photographer / Organizer only</p>
    <input
      type="password"
      class="gate-input"
      id="gate-input"
      placeholder="Enter password"
      autocomplete="current-password"
    />
    <button class="gate-btn" id="gate-btn">Enter →</button>
    <p class="gate-error" id="gate-error"></p>
  </div>
</div>

<!-- ── Main App ── -->
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <span class="brand-badge">Admin</span>
      <span class="brand-name">Photo <em>Wall</em></span>
    </div>
    <button class="logout-btn" id="logout-btn">Log out</button>
  </div>

  <!-- Upload -->
  <div class="upload-section">
    <p class="section-label">Upload Photos</p>

    <div class="upload-zone" id="upload-zone">
      <div class="upload-zone-icon">📸</div>
      <p class="upload-zone-text">Drop photos here</p>
      <p class="upload-zone-sub">JPG, PNG, WEBP · Max 32 MB per photo</p>
    </div>

    <input type="file" id="file-input" accept="image/*" multiple />

    <div class="upload-actions">
      <button class="btn-primary" id="select-btn">
        <span>✦</span> Select Photos
      </button>
      <button class="btn-secondary" id="upload-btn" disabled>
        ↑ Upload All
      </button>
    </div>
  </div>

  <!-- Queue -->
  <div class="queue" id="queue"></div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Gallery manage -->
  <div class="gallery-section">
    <div class="gallery-header-row">
      <span class="gallery-count-label">Photos on wall —</span>
      <span class="gallery-count-num" id="count">0</span>
    </div>

    <div class="masonry" id="gallery"></div>
    <div class="spinner" id="loader"></div>
  </div>
</div>

<!-- Confirm delete dialog -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-card">
    <div class="confirm-icon">🗑️</div>
    <p class="confirm-title">Delete this photo?</p>
    <p class="confirm-sub">It will be removed from the photo wall immediately.</p>
    <div class="confirm-actions">
      <button class="confirm-cancel" id="confirm-cancel">Cancel</button>
      <button class="confirm-delete" id="confirm-delete">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="firebase-config.js"></script>
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref as dbRef, push, remove, query, orderByChild, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ════════════════════════════════════════════════
  //  ⚠️  SET YOUR ADMIN PASSWORD HERE
  // ════════════════════════════════════════════════
  const ADMIN_PASSWORD = "wedding2024";

  // ════════════════════════════════════════════════
  //  ImgBB API Key
  //  Get free key at: https://api.imgbb.com/
  // ════════════════════════════════════════════════
  const IMGBB_API_KEY = "108597ee742d2e6956a8b7a23b542682";

  // ── Firebase init ─────────────────────────────
  const app       = initializeApp(FIREBASE_CONFIG);
  const database  = getDatabase(app);
  const photosRef = dbRef(database, 'photos');

  // ── DOM ───────────────────────────────────────
  const gate           = document.getElementById('gate');
  const gateInput      = document.getElementById('gate-input');
  const gateBtn        = document.getElementById('gate-btn');
  const gateError      = document.getElementById('gate-error');
  const logoutBtn      = document.getElementById('logout-btn');
  const uploadZone     = document.getElementById('upload-zone');
  const fileInput      = document.getElementById('file-input');
  const selectBtn      = document.getElementById('select-btn');
  const uploadBtn      = document.getElementById('upload-btn');
  const queueEl        = document.getElementById('queue');
  const gallery        = document.getElementById('gallery');
  const loader         = document.getElementById('loader');
  const countEl        = document.getElementById('count');
  const toast          = document.getElementById('toast');
  const confirmOverlay = document.getElementById('confirm-overlay');
  const confirmCancel  = document.getElementById('confirm-cancel');
  const confirmDelete  = document.getElementById('confirm-delete');

  let selectedFiles   = [];
  let rendered        = new Set();
  let pendingDeleteKey = null;
  let toastTimer      = null;

  // ── Password gate ─────────────────────────────
  function unlock() {
    if (gateInput.value === ADMIN_PASSWORD) {
      gate.classList.add('hidden');
      sessionStorage.setItem('admin_unlocked', '1');
    } else {
      gateInput.classList.add('error');
      gateError.textContent = 'Incorrect password. Try again.';
      setTimeout(() => gateInput.classList.remove('error'), 400);
    }
  }

  if (sessionStorage.getItem('admin_unlocked') === '1') gate.classList.add('hidden');
  gateBtn.addEventListener('click', unlock);
  gateInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
  logoutBtn.addEventListener('click', () => {
    sessionStorage.removeItem('admin_unlocked');
    location.reload();
  });

  // ── Toast ─────────────────────────────────────
  function showToast(msg, type = '') {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    toastTimer = setTimeout(() => { toast.className = 'toast'; }, 3200);
  }

  // ── File selection ────────────────────────────
  function setFiles(files) {
    selectedFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
    renderQueue();
    uploadBtn.disabled = selectedFiles.length === 0;
  }

  selectBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => { setFiles(fileInput.files); fileInput.value = ''; });
  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', ()  => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    setFiles(e.dataTransfer.files);
  });

  // ── Queue render ──────────────────────────────
  function renderQueue() {
    queueEl.innerHTML = '';
    selectedFiles.forEach((file, i) => {
      const thumb = URL.createObjectURL(file);
      const item  = document.createElement('div');
      item.className = 'queue-item';
      item.id = `qi-${i}`;
      item.innerHTML = `
        <img class="queue-thumb" src="${thumb}" alt="" />
        <div class="queue-info">
          <div class="queue-name">${file.name}</div>
          <div class="queue-status" id="qs-${i}">Ready</div>
          <div class="queue-bar-bg"><div class="queue-bar-fill" id="qb-${i}"></div></div>
        </div>
        <span class="queue-check" id="qc-${i}"></span>`;
      queueEl.appendChild(item);
    });
  }

  // ── Upload via ImgBB ──────────────────────────
  async function uploadToImgBB(file, onProgress) {
    const reader = new FileReader();
    const b64 = await new Promise((res, rej) => {
      reader.onload  = () => res(reader.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(file);
    });

    const formData = new FormData();
    formData.append('key', IMGBB_API_KEY);
    formData.append('image', b64);
    formData.append('name', `wedding_${Date.now()}`);

    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.upload.onprogress = e => {
        if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 100));
      };
      xhr.onload = () => {
        try {
          const data = JSON.parse(xhr.responseText);
          if (data.success) resolve(data.data.url);
          else reject(new Error(data.error?.message || 'ImgBB error'));
        } catch { reject(new Error('Parse error')); }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.open('POST', 'https://api.imgbb.com/1/upload');
      xhr.send(formData);
    });
  }

  // ── Upload all ────────────────────────────────
  uploadBtn.addEventListener('click', async () => {
    if (!selectedFiles.length) return;
    if (IMGBB_API_KEY === 'YOUR_IMGBB_API_KEY') {
      showToast('⚠️ Set your ImgBB API key in admin.html first!', 'error');
      return;
    }

    uploadBtn.disabled  = true;
    selectBtn.disabled  = true;
    let successCount = 0;

    for (let i = 0; i < selectedFiles.length; i++) {
      const file    = selectedFiles[i];
      const statusEl = document.getElementById(`qs-${i}`);
      const barEl    = document.getElementById(`qb-${i}`);
      const checkEl  = document.getElementById(`qc-${i}`);

      statusEl.textContent = 'Uploading…';
      try {
        const url = await uploadToImgBB(file, pct => {
          barEl.style.width = pct + '%';
          statusEl.textContent = `Uploading… ${pct}%`;
        });

        // Save URL to Firebase Realtime Database
        await push(photosRef, { url, timestamp: Date.now(), name: file.name });
        barEl.style.width = '100%';
        statusEl.textContent = 'Done ✓';
        checkEl.textContent  = '✅';
        successCount++;
      } catch (err) {
        statusEl.textContent = 'Failed ✗';
        checkEl.textContent  = '❌';
        console.error(err);
      }
    }

    uploadBtn.disabled  = false;
    selectBtn.disabled  = false;
    selectedFiles       = [];
    fileInput.value     = '';
    uploadBtn.disabled  = true;

    showToast(`✦ ${successCount} photo${successCount > 1 ? 's' : ''} added to wall!`, 'success');
    setTimeout(() => { queueEl.innerHTML = ''; }, 3000);
  });

  // ── Confirm delete dialog ─────────────────────
  function openConfirm(key) {
    pendingDeleteKey = key;
    confirmOverlay.classList.add('open');
  }
  confirmCancel.addEventListener('click', () => {
    confirmOverlay.classList.remove('open');
    pendingDeleteKey = null;
  });
  confirmDelete.addEventListener('click', async () => {
    if (!pendingDeleteKey) return;
    confirmOverlay.classList.remove('open');
    try {
      await remove(dbRef(database, `photos/${pendingDeleteKey}`));
      // Remove from DOM
      const el = document.querySelector(`[data-key="${pendingDeleteKey}"]`);
      if (el) el.remove();
      rendered.delete(pendingDeleteKey);
      updateCount();
      showToast('Photo removed from wall', '');
    } catch {
      showToast('Could not delete. Try again.', 'error');
    }
    pendingDeleteKey = null;
  });
  confirmOverlay.addEventListener('click', e => {
    if (e.target === confirmOverlay) {
      confirmOverlay.classList.remove('open');
      pendingDeleteKey = null;
    }
  });

  // ── Gallery ───────────────────────────────────
  function updateCount() {
    countEl.textContent = gallery.querySelectorAll('.m-item').length;
  }

  function addPhoto(key, data) {
    if (rendered.has(key)) return;
    rendered.add(key);

    const item = document.createElement('div');
    item.className = 'm-item';
    item.dataset.key = key;
    item.innerHTML = `
      <img src="${data.url}" alt="Wedding photo" loading="lazy" />
      <div class="del-overlay">
        <button class="del-btn" data-key="${key}">🗑 Delete</button>
      </div>`;

    item.querySelector('.del-btn').addEventListener('click', () => openConfirm(key));

    if (gallery.firstChild) gallery.insertBefore(item, gallery.firstChild);
    else gallery.appendChild(item);

    updateCount();
  }

  // ── Real-time listener ────────────────────────
  const photosQuery = query(photosRef, orderByChild('timestamp'));
  onValue(photosQuery, snap => {
    loader.style.display = 'none';
    if (!snap.exists()) {
      if (!gallery.querySelector('.empty-state')) {
        gallery.innerHTML = `<div class="empty-state"><div class="es-icon">🖼️</div><p>No photos yet. Upload some!</p></div>`;
      }
      return;
    }
    const es = gallery.querySelector('.empty-state');
    if (es) es.remove();

    const all = [];
    snap.forEach(c => all.push({ key: c.key, ...c.val() }));
    all.slice().reverse().forEach(p => addPhoto(p.key, p));
    updateCount();
  });
</script>

</body>
</html>
